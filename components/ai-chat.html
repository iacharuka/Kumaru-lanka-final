<section id="aiChatWidget" class="ai-chat-widget" aria-label="AI trip planning chat">
  <button id="chatToggle" class="chat-toggle" type="button">AI Planner</button>
  <div id="chatPanel" class="chat-panel hidden">
    <header>
      <h4>Trip Planner Assistant</h4>
      <p>Ask for routes, durations, and travel tips.</p>
    </header>
    <div id="chatMessages" class="chat-messages"></div>
    <form id="chatForm" class="chat-form">
      <input id="chatInput" type="text" placeholder="Plan a 5-day hill country trip" required />
      <button class="btn btn-primary" type="submit">Send</button>
    </form>
  </div>
</section>
