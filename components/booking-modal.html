<dialog id="bookingModal" class="booking-modal">
  <form method="dialog" class="booking-content">
    <h3>Book Your Experience</h3>
    <p id="selectedPackageText">Selected package: Custom</p>
    <label>Full Name<input type="text" required /></label>
    <label>Email<input type="email" required /></label>
    <label>Travel Dates<input type="text" placeholder="e.g. 12 Aug - 20 Aug" required /></label>
    <div class="modal-actions">
      <button value="cancel" class="btn btn-outline">Cancel</button>
      <button value="submit" class="btn btn-primary">Submit Request</button>
    </div>
  </form>
</dialog>
